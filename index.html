<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Talha's Stream - FIFA</title>
<link rel="icon" href="https://s10.gifyu.com/images/SrMU9.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select:none;
    user-select:none;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020206;
    overflow-x:hidden;
    overflow-y:auto;
    color:#fff;
    padding: 20px 10px;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 5% 10%, rgba(122, 60, 255, 0.35), transparent 40%),
        radial-gradient(circle at 95% 10%, rgba(0, 242, 254, 0.25), transparent 40%),
        radial-gradient(circle at 50% 90%, rgba(224, 76, 255, 0.2), transparent 45%);
    z-index: 0;
}

#particles{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index: 1;
}
.p{
    position:absolute;
    width:2px;
    height:2px;
    background: linear-gradient(135deg, #7a3cff, #00f2fe);
    border-radius:50%;
    opacity:.35;
    animation:float linear infinite;
}
@keyframes float{
    from{transform:translateY(105vh) scale(0.8)}
    to{transform:translateY(-120px) scale(1.4)}
}

#loader{
    position:fixed;
    inset:0;
    background:#020206;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
#loader h1{
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 900;
    letter-spacing:6px;
    background: linear-gradient(90deg, #7a3cff, #00f2fe, #e04cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 25px rgba(122,60,255,0.7));
    text-align: center;
    padding: 0 15px;
}
.bar{
    width:min(80vw, 260px);
    height:3px;
    background:rgba(255,255,255,0.02);
    border-radius:50px;
    overflow:hidden;
    margin-top:30px;
}
.bar::before{
    content:"";
    display:block;
    height:100%;
    width:35%;
    background:linear-gradient(90deg, #7a3cff, #00f2fe, #e04cff);
    animation:load 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}
@keyframes load{
    from{transform:translateX(-100%)}
    to{transform:translateX(300%)}
}

.maintenance-box {
    background: rgba(255, 165, 0, 0.12);
    border: 1px solid rgba(255, 165, 0, 0.35);
    color: #ffd175;
    padding: 12px 20px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    margin: 0 auto 24px auto;
    max-width: 100%;
    width: 380px;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeInDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes fadeInDown {
    0% { opacity: 0; transform: translateY(-10px); }
    100% { opacity: 1; transform: translateY(0); }
}

.card{
    width: 100%;
    max-width: 1100px;
    background: rgba(5, 5, 10, 0.7);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    padding: clamp(15px, 4vw, 30px);
    box-shadow: 0 40px 90px rgba(0,0,0,0.75), inset 0 1px 2px rgba(255,255,255,0.12);
    position: relative;
    z-index: 2;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.card.theatre-active {
    max-width: 100% !important;
    width: 96vw;
    padding: 10px;
    background: rgba(0, 0, 0, 0.95);
}
.card.theatre-active .filter-bar,
.card.theatre-active .servers,
.card.theatre-active .analytics-panel,
.card.theatre-active footer,
.card.theatre-active .utility-panel,
.card.theatre-active .maintenance-box {
    display: none !important;
}

#login {
    text-align: center;
    padding: 40px 10px;
}
#login h2{
    font-size: clamp(18px, 4vw, 26px);
    margin-bottom:24px;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.5) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
input[type="password"]{
    width:100%;
    max-width: 380px;
    padding:16px 24px;
    border:1px solid rgba(255,255,255,0.05);
    border-radius:16px;
    outline:none;
    background: rgba(255,255,255,0.02);
    color: #fff;
    font-size: 16px;
    text-align: center;
    transition: all 0.3s;
    margin-bottom: 20px;
}
input[type="password"]:focus{
    border-color: #00f2fe;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 30px rgba(0,242,254,0.2);
}
#login button{
    width: 100%;
    max-width: 380px;
    padding:16px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 1.5px;
    transition: all 0.2s;
    background: linear-gradient(90deg, #7a3cff, #00f2fe);
    color: #fff;
    box-shadow: 0 6px 30px rgba(122,60,255,0.4);
}

.analytics-panel {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
}
.stat-card {
    flex: 1;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}
.stat-card span { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 700; letter-spacing: 0.5px; }
.stat-card font { font-size: 15px; font-weight: 800; color: #00f2fe; }
.stat-card.fifa-stat font { color: #e04cff; }

.player-container {
    position: relative;
    width: 100%;
    padding-top: 56.25%; 
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 25px 60px rgba(0,0,0,0.7);
}
iframe{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
}
.theatre-active .player-container {
    padding-top: 52%; 
    border-radius: 12px;
}

.utility-panel {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
}
.util-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.2s;
}
.util-btn:hover { color: #00f2fe; }
.theatre-exit-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 10000;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    display: none;
    font-size: 12px;
}

.filter-bar {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
}
.search-box { flex: 1; min-width: 240px; }
.search-box input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    color: #fff;
    font-size: 13px;
    outline: none;
    transition: all 0.3s;
}
.search-box input:focus { border-color: #7a3cff; background: rgba(255, 255, 255, 0.05); }
.filter-tabs { display: flex; gap: 8px; }
.tab-btn {
    padding: 11px 16px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.5);
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
}
.tab-btn.active {
    background: rgba(122, 60, 255, 0.15);
    border-color: #7a3cff;
    color: #fff;
}

.servers{
    display: flex;
    gap: 8px;
    flex-direction: column;
    margin-top: 12px;
    max-height: 240px;
    overflow-y: auto;
    padding-right: 2px;
}
.servers::-webkit-scrollbar { width: 3px; }
.servers::-webkit-scrollbar-track { background: transparent; }
.servers::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }
.servers::-webkit-scrollbar-thumb:hover { background: #7a3cff; }

.servers button{
    width: 100%;
    background: rgba(255,255,255,0.01);
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.04);
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.2s ease;
    cursor: pointer;
    gap: 10px;
}
.servers button span {
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
}
.servers button:hover{ background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.1); }
.servers button.active{
    background: linear-gradient(90deg, rgba(122,60,255,0.15) 0%, rgba(0,242,254,0.02) 100%);
    color: #fff;
    border: 1px solid rgba(122, 60, 255, 0.4);
    font-weight: 700;
}

.live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    color: #00f2fe;
    background: rgba(0, 242, 254, 0.06);
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid rgba(0, 242, 254, 0.12);
    white-space: nowrap;
}
.fifa-badge {
    color: #e04cff;
    background: rgba(224, 76, 255, 0.06);
    border: 1px solid rgba(224, 76, 255, 0.15);
}
.live-dot {
    width: 5px;
    height: 5px;
    background: #00f2fe;
    border-radius: 50%;
    box-shadow: 0 0 8px #00f2fe;
    animation: blink 1s infinite alternate;
}
.fifa-dot { background: #e04cff; box-shadow: 0 0 8px #e04cff; }

@keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }

footer{ text-align:center; margin-top:20px; opacity:.2; font-size:11px; }
.fade{ animation: appFade .25s ease-out; }
@keyframes appFade{ from{opacity:.6;} to{opacity:1;} }

@media(max-width: 600px) {
    body { padding: 10px 5px; }
    .analytics-panel { display: none; }
    .filter-bar { flex-direction: column; align-items: stretch; }
    .search-box { min-width: 100%; }
    .filter-tabs { width: 100%; display: flex; }
    .filter-tabs button { flex: 1; text-align: center; }
}
</style>
</head>

<body>

<button class="theatre-exit-btn" id="exitTheatre" onclick="toggleTheatre(false)">Exit Cinema Mode</button>

<div id="loader">
    <h1>TALHA'S STREAM</h1>
    <div class="bar"></div>
</div>

<div id="particles"></div>

<div class="card" id="mainCard">

    <div id="maintenanceNotice" class="maintenance-box">
        <span>⚠️</span>
        <span>সার্ভার রক্ষণাবেক্ষণের কাজ চলায় ভিডিও বাফারিং হতে পারে। এই সাময়িক অসুবিধার জন্য আমরা দুঃখিত।</span>
    </div>

    <div id="login">
        <h2>Authentication</h2>
        <input id="password" type="password" placeholder="Passcode Entry" onkeydown="if(event.key==='Enter') login()">
        <br>
        <button onclick="login()">Enter</button>
    </div>

    <div id="playerWrap" style="display:none">
        
        <div class="analytics-panel">
            <div class="stat-card">
                <span>ACTIVE SIGNALS FEED</span>
                <font id="countTotal">00</font>
            </div>
            <div class="stat-card fifa-stat">
                <span>FIFA PREMIUM FEEDS</span>
                <font id="countFifa">00</font>
            </div>
        </div>

        <div class="player-container">
            <iframe id="frame" src="" scrolling="no" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope, picture-in-picture; fullscreen; geolocation; web-share; speaker-selection; screen-wake-lock; Idle-detection" allowfullscreen></iframe>
        </div>
        
        <div class="utility-panel">
            <button class="util-btn" onclick="toggleTheatre(true)">🎬 Theater Mode</button>
        </div>

        <div class="filter-bar">
            <div class="search-box">
                <input type="text" id="searchChannels" placeholder="🔍 Deep search team or league..." oninput="filterMatches()">
            </div>
            <div class="filter-tabs">
                <button class="tab-btn active" id="btnAll" onclick="setFilter('all')">All Feeds</button>
                <button class="tab-btn" id="btnFifa" onclick="setFilter('fifa')">🏆 FIFA 2026</button>
            </div>
        </div>

        <div class="servers" id="serverContainer"></div>
    </div>

    <footer>Made By Talha • © 2020-2026</footer>
</div>

<script>

const SHOW_MAINTENANCE_MSG = true; 
const PASSWORD = "Talha";
let liveEvents = [];
let currentFilter = 'all'; 
const PLAYER_BASE_URL = "player.html"; 

const noticeBox = document.getElementById("maintenanceNotice");
if (SHOW_MAINTENANCE_MSG) {
    noticeBox.style.display = "flex";
} else {
    noticeBox.style.display = "none";
}

const translationDict = {
  "almanya": "Germany", "fransa": "France", "paris basketball": "Paris Basketball",
  "as monaco": "AS Monaco", "barcelona": "Barcelona", "füchse berlin": "Fuchse Berlin",
  "curaçao": "Curacao", "curaca": "Curacao", "türkiye": "Turkey", "İngiltere": "England",
  "ispanya": "Spain", "italya": "Italy", "voleybol": "Volleyball", "erkekler": "Men's",
  "kadınlar": "Women's", "milletler ligi": "Nations League", "lnb pro a final": "LNB Pro A Final",
  "hentbol": "Handball", "şampiyonlar ligi": "Champions League", "Şampiyonlar Ligi": "Champions League",
  "finali": "Final", "final": "Final", "dünya kupası": "World Cup", "dunya kupasi": "World Cup",
  "hazırlık maçı": "Friendly Match", "futbol": "Football", "basketbol": "Basketball",
  "türkçe": "Turkish", "canlı": "Live"
};

function translateText(text) {
  if (!text) return "";
  let translated = text;
  Object.keys(translationDict).forEach(turkWord => {
    const regex = new RegExp(turkWord, "gi");
    translated = translated.replace(regex, translationDict[turkWord]);
  });
  return translated.replace(/Ã¼/g, "u").replace(/Ã§/g, "c").replace(/ÅŸ/g, "s")
                   .replace(/Åž/g, "S").replace(/Ä±/g, "i").replace(/Ã¶/g, "o");
}

function login(){
  const pass = document.getElementById("password").value;
  if(pass === PASSWORD){
    document.getElementById("login").style.display = "none";
    document.getElementById("playerWrap").style.display = "block";
    loadTargetScript();
  }else{
    alert("Authentication Failure.");
  }
}

function loadTargetScript() {
  const container = document.getElementById("serverContainer");
  container.innerHTML = "<p style='color:rgba(255,255,255,0.4);text-align:center;font-size:13px;padding:30px;'>Syncing system satellite channels...</p>";

  const oldScript = document.getElementById("mahsunScript");
  if(oldScript) oldScript.remove();

  const script = document.createElement("script");
  script.id = "mahsunScript";
  script.src = "https://mahsunsports39.xyz/script4.js?v=" + Date.now();
  
  script.onload = () => {
    try {
      let tempEvents = [];
      if (typeof karsilasmalar !== "undefined" && Array.isArray(karsilasmalar)) {
        tempEvents = karsilasmalar;
      } else {
        container.innerHTML = "<p style='color:#e04cff;text-align:center;'>Feed Vector Missing.</p>";
        return;
      }

      tempEvents.sort((a, b) => {
        const aTitle = String(a.title || "").toLowerCase();
        const aLeague = String(a.league || "").toLowerCase();
        const bTitle = String(b.title || "").toLowerCase();
        const bLeague = String(b.league || "").toLowerCase();

        const aHasFifa = aTitle.includes("fifa") || aLeague.includes("fifa") || aTitle.includes("dünya kupası") || aLeague.includes("dünya kupası");
        const bHasFifa = bTitle.includes("fifa") || bLeague.includes("fifa") || bTitle.includes("dünya kupası") || bLeague.includes("dünya kupası");

        if (aHasFifa && !bHasFifa) return -1; 
        if (!aHasFifa && bHasFifa) return 1;  
        return 0; 
      });

      const activeCustomFeeds = CUSTOM_TOP_FEEDS.filter(item => item.show === true);
      liveEvents = [...activeCustomFeeds, ...tempEvents];

      updateAnalytics();
      renderMatches();

      if (liveEvents.length > 0) {
        triggerFirstStream();
      }

} catch (err) {
      container.innerHTML = "<p style='color:#e04cff;text-align:center;'>Core Exception Processing Feeds.</p>";
    }
  };
  document.body.appendChild(script);
}

function updateAnalytics() {
    let total = liveEvents.length;
    let fifaCount = 0;
    liveEvents.forEach(e => {
        let t = translateText(e.title).toLowerCase();
        let l = translateText(e.league).toLowerCase();
        if(t.includes("fifa") || l.includes("fifa") || t.includes("world cup") || l.includes("world cup") || e.isFifa) { fifaCount++; }
    });
    document.getElementById("countTotal").innerText = String(total).padStart(2, '0');
    document.getElementById("countFifa").innerText = String(fifaCount).padStart(2, '0');
}

function renderMatches() {
  const container = document.getElementById("serverContainer");
  const searchQuery = document.getElementById("searchChannels").value.toLowerCase();
  container.innerHTML = "";

  let visibleCount = 0;

  liveEvents.forEach((event, index) => {
    let englishTitle = translateText(event.title);
    let englishLeague = translateText(event.league);
    
    const isFifa = (event.title && event.title.toLowerCase().includes("fifa")) || 
                    (event.league && event.league.toLowerCase().includes("fifa")) || 
                    englishTitle.toLowerCase().includes("world cup") || 
                    englishLeague.toLowerCase().includes("world cup") || event.isFifa;

    if (currentFilter === 'fifa' && !isFifa) return;

    const fullMatchText = (englishTitle + " " + englishLeague).toLowerCase();
    if (searchQuery && !fullMatchText.includes(searchQuery)) return;

    const btn = document.createElement("button");
    let prefix = isFifa ? "⚽ " : `LIVE ${String(index + 1).padStart(2, '0')} : `;
    let buttonText = `<span>${prefix}${englishTitle} ${englishLeague ? `[${englishLeague}]` : ''}</span>`;
    
    let badgeHTML = isFifa ? 
        `<div class="live-badge fifa-badge"><div class="live-dot fifa-dot"></div>FIFA</div>` : 
        `<div class="live-badge"><div class="live-dot"></div>${event.time ? event.time : 'ONLINE'}</div>`;
        
    btn.innerHTML = buttonText + badgeHTML;
    
    btn.onclick = () => setServer(event, btn);
    container.appendChild(btn);
    visibleCount++;
  });

  if(visibleCount === 0) {
      container.innerHTML = "<p style='color:rgba(255,255,255,0.3);text-align:center;font-size:13px;padding:25px;'>No channels match active matrix filters.</p>";
  }
}

function triggerFirstStream() {
    const container = document.getElementById("serverContainer");
    const firstBtn = container.querySelector("button");
    if (firstBtn) {
        firstBtn.click();
    }
}

function setFilter(type) {
    currentFilter = type;
    document.getElementById("btnAll").classList.toggle("active", type === 'all');
    document.getElementById("btnFifa").classList.toggle("active", type === 'fifa');
    renderMatches();
}

function filterMatches() {
    renderMatches();
}

function setServer(event, targetBtn){
  const frame = document.getElementById("frame");
  frame.classList.add("fade");
  
  let finalUrl = "";
  
  if(event.url) {
      const urlStr = event.url.toLowerCase();

      if (event.isIframeOnly === true) {
          finalUrl = event.url;
      }
      else if (urlStr.includes(".m3u8")) {
          finalUrl = `${PLAYER_BASE_URL}?Talha=${encodeURIComponent(event.url)}`;
      }
      else if (event.url.includes("id=")) {
          const urlParams = new URLSearchParams(event.url.split('?')[1]);
          let id = urlParams.get('id') || "androstreamlivetrt1";
          finalUrl = `${PLAYER_BASE_URL}?Talha=${encodeURIComponent(id)}`;
      }
      else {
          finalUrl = event.url;
      }
  } else {
      finalUrl = `${PLAYER_BASE_URL}?Talha=androstreamlivetrt1`;
  }
  
  frame.src = finalUrl;
  setTimeout(()=>frame.classList.remove("fade"), 400);

  document.querySelectorAll(".servers button").forEach(btn => btn.classList.remove("active"));
  if(targetBtn) targetBtn.classList.add("active");
}

function toggleTheatre(status) {
    const card = document.getElementById("mainCard");
    const exitBtn = document.getElementById("exitTheatre");
    if(status) {
        card.classList.add("theatre-active");
        exitBtn.style.display = "block";
    } else {
        card.classList.remove("theatre-active");
        exitBtn.style.display = "none";
    }
}

for(let i=0; i < (window.innerWidth < 600 ? 15 : 35); i++){
  let d = document.createElement("div");
  d.className = "p";
  d.style.left = Math.random()*100+"%";
  d.style.animationDuration = (14+Math.random()*12)+"s";
  document.getElementById("particles").appendChild(d);
}

window.onload = () => {
  setTimeout(() => {
    const ld = document.getElementById("loader");
    if(ld) {
        ld.style.opacity = "0";
        setTimeout(() => ld.remove(), 500);
    }
  }, 1200);
};
</script>
</body>
</html>
