<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Talha Stream - FIFA</title>
<link rel="icon" href="https://s10.gifyu.com/images/SrMU9.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050510;
overflow:hidden;
color:#fff;
}

/* Background glow */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(0,255,255,.18),transparent 35%),
radial-gradient(circle at 80% 20%,rgba(255,0,255,.18),transparent 35%),
radial-gradient(circle at 50% 80%,rgba(0,255,120,.12),transparent 40%);
filter:blur(0px);
}

/* particles */
#particles{position:fixed;inset:0;pointer-events:none}
.p{
position:absolute;
width:3px;height:3px;
background:cyan;
border-radius:50%;
opacity:.7;
animation:float linear infinite;
}
@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-120px)}
}

/* loader */
#loader{
position:fixed;
inset:0;
background:#050510;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}
#loader h1{
letter-spacing:4px;
color:cyan;
text-shadow:0 0 20px cyan;
}
.bar{
width:260px;height:6px;
background:#222;
border-radius:50px;
overflow:hidden;
margin-top:20px;
}
.bar::before{
content:"";
display:block;
height:100%;
width:40%;
background:linear-gradient(90deg,cyan,magenta);
animation:load 1.5s linear infinite;
}
@keyframes load{
from{transform:translateX(-100%)}
to{transform:translateX(300%)}
}

/* main card */
.card{
width:min(95vw,900px);
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
border-radius:25px;
padding:25px;
box-shadow:0 0 40px rgba(0,255,255,.15);
position:relative;
z-index:2;
}

/* input */
input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:10px;
outline:none;
}

/* button */
button{
padding:10px 14px;
border:none;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

/* login */
#login h2{
margin-bottom:10px;
}

/* iframe */
iframe{
width:100%;
height:300px;
border:none;
border-radius:18px;
box-shadow:0 0 25px cyan;
transition:.3s;
}

/* server buttons */
.servers{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:12px;
}

.servers button{
background:#1a1a1a;
color:#fff;
border:1px solid rgba(255,255,255,.15);
}

.servers button.active{
background:cyan;
color:#000;
box-shadow:0 0 15px cyan;
transform:scale(1.05);
}

/* footer */
footer{
text-align:center;
margin-top:10px;
opacity:.7;
font-size:13px;
}

/* fade effect */
.fade{
animation:fade .3s ease;
}
@keyframes fade{
from{opacity:.3}
to{opacity:1}
}
</style>
</head>

<body>

<div id="loader">
<h1>TALHA'S STREAM</h1>
<div class="bar"></div>
</div>

<div id="particles"></div>

<div class="card">

<!-- LOGIN -->
<div id="login">
<h2>Enter Password</h2>
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Unlock</button>
</div>

<!-- PLAYER -->
<div id="playerWrap" style="display:none">

<iframe id="frame" src="https://talha-07-live.github.io/Talhas-Web-Host2/fifa1.html" scrolling="no" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope, picture-in-picture; fullscreen; geolocation; web-share; speaker-selection; screen-wake-lock; Idle-detection" allowfullscreen></iframe>

<div class="servers">
<button onclick="setServer(1)" class="active">Server 1</button>
<button onclick="setServer(2)">Server 2</button>
<button onclick="setServer(3)">Server 3</button>
<button onclick="setServer(4)">Server 4</button>
<button onclick="setServer(5)">Server 5</button>
<button onclick="setServer(6)">Server 6</button>
</div>

</div>

<footer>Made By Talha ©2020-2026</footer>

</div>

<script>
const PASSWORD="Talha";
let current=1;

function login(){
const pass=document.getElementById("password").value;
if(pass===PASSWORD){
document.getElementById("login").style.display="none";
document.getElementById("playerWrap").style.display="block";
}else{
alert("Wrong Password");
}
}

function setServer(n){
current=n;

const frame=document.getElementById("frame");

const urls={
1:'https://talha-07-live.github.io/Talhas-Web-Host2/fifa1.html',
2:'https://bdix.my.id/onair/e.php',
3:'https://talha-07-live.github.io/Talhas-Web-Host2/idmantv.html',
4:'https://talha-07-live.github.io/Talhas-Web-Host2/cbcsports.html',
5:'https://talha-07-live.github.io/Talhas-Web-Host2/binext1.html',
6:'https://talha-07-live.github.io/Talhas-Web-Host2/binext2.html'
};

frame.classList.add("fade");
frame.src=urls[n];

setTimeout(()=>frame.classList.remove("fade"),400);

/* highlight active button */
document.querySelectorAll(".servers button").forEach((btn,i)=>{
btn.classList.remove("active");
});
document.querySelectorAll(".servers button")[n-1].classList.add("active");
}

/* particles */
for(let i=0;i<70;i++){
let d=document.createElement("div");
d.className="p";
d.style.left=Math.random()*100+"%";
d.style.animationDuration=(8+Math.random()*20)+"s";
document.getElementById("particles").appendChild(d);
}

/* loader */
window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.opacity="0";
setTimeout(()=>document.getElementById("loader").remove(),500);
},1200);
};
</script>

</body>
</html>
