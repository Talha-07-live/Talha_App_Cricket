<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>Talha's Ultra-Premium Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.15.5/shaka-player.compiled.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
-webkit-user-select:none;
user-select:none;
}

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
position:fixed;
}

.player-shell{
position:relative;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
cursor: pointer;
touch-action: none; /* মোবাইলের ডিফল্ট জুম/স্ক্রোল জনিত টাচ ডিলে বন্ধ করবে */
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
z-index:1;
}

/* APP STYLE CENTER PLAY BUTTON */
.center-play{
position:absolute;
top:43%;
left:50%;
transform:translate(-50%,-50%) scale(1);
width:55px;
height:55px;
border-radius:50%;
background:rgba(122,60,255,0.9);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:80;
transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
box-shadow:0 0 25px rgba(122,60,255,0.6);
}

.center-play.hide{
opacity:0;
pointer-events:none;
transform:translate(-50%,-50%) scale(0.4);
}

.center-play svg{
width:32px;
height:32px;
fill:white;
}

/* ADVANCED PREMIUM CONTROLS */
.controls{
position:absolute;
left:0;
right:0;
bottom:0;
padding:20px 16px;
background:linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 70%, transparent 100%);
z-index:50;
opacity:1;
transition:opacity 0.25s ease, transform 0.25s ease;
transform:translateY(0);
}

.controls.hide{
opacity:0;
pointer-events:none;
transform:translateY(10px);
}

.progress-track{
width:100%;
height:4px;
background:rgba(255,255,255,0.2);
border-radius:999px;
position:relative;
cursor:pointer;
transition:height 0.1s;
}

.progress-track:hover {
height: 6px;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#7a3cff,#d14cff);
border-radius:999px;
position:relative;
}

.controls-row{
margin-top:14px;
display:flex;
justify-content:space-between;
align-items:center;
}

.controls-left,.controls-right{
display:flex;
align-items:center;
gap:12px;
}

.control-btn{
width:38px;
height:38px;
border:none;
cursor:pointer;
border-radius:12px;
background:rgba(255, 255, 255, 0.08);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
display:flex;
justify-content:center;
align-items:center;
color:white;
transition:background 0.2s, transform 0.1s;
}

.control-btn:active {
transform:scale(0.92);
background:rgba(255, 255, 255, 0.15);
}

.control-btn svg{
width:16px;
height:16px;
fill:white;
}

.delay-pill{
padding:6px 12px;
border-radius:10px;
background:rgba(122,60,255,0.15);
border:1px solid rgba(122,60,255,0.3);
color:#d14cff;
font-weight:700;
font-size:13px;
letter-spacing:0.5px;
}

.go-live{
padding:6px 14px;
border:none;
cursor:pointer;
border-radius:10px;
background:linear-gradient(90deg,#7a3cff,#c14dff);
color:white;
font-weight:700;
font-size:12px;
letter-spacing:0.5px;
box-shadow:0 4px 12px rgba(122,60,255,0.3);
transition:all 0.2s;
}

.go-live:active{
transform:scale(0.95);
box-shadow:0 2px 6px rgba(122,60,255,0.3);
}

/* ─── SPINNER MODIFIED EXACTLY TO FIRST SCRIPT ─── */
.loader{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
z-index:100;
transition:opacity 0.4s ease;
}

.spinner{
width:50px;
height:50px;
border-radius:50%;
border:3px solid rgba(255,255,255,0.02);
border-top:3px solid #7a3cff;
border-right:3px solid #e04cff;
animation:spin 0.55s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

button, .control-btn, .go-live {
-webkit-tap-highlight-color: transparent;
outline: none;
}
</style>
</head>

<body>

<div class="player-shell" id="playerShell">

<video id="video" autoplay playsinline crossorigin="anonymous"></video> 

<div class="center-play" id="centerPlay">
<svg viewBox="0 0 24 24">
<path d="M8 5v14l11-7z"/>
</svg>
</div>

<div class="loader" id="loader"><div class="spinner"></div></div>

<div class="controls" id="controls">

<div class="progress-track" id="track">
<div class="progress-fill" id="progress"></div>
</div>

<div class="controls-row">
<div class="controls-left">
<button class="control-btn" id="playBtn">
<svg viewBox="0 0 24 24" id="playIcon">
<path d="M8 5v14l11-7z"/>
</svg>
</button>
<button class="control-btn" id="fwdBtn">⟳</button>
<div class="delay-pill" id="delay">-00:00</div>
<button class="go-live" id="goLive">GO LIVE</button>
</div>

<div class="controls-right">
<button class="control-btn" id="fullscreenBtn">⛶</button>
</div>
</div>

</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const channelId = params.get("Talha");

if (!channelId) {
document.body.innerHTML = `
<div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#000;color:#fff;font-family:Arial,sans-serif;font-size:18px;">
Channel Parameters Missing
</div>`;
throw new Error("Missing Channel ID");
}

const STREAM_URL = `https://andro.evrenesoglu57.click/checklist/${channelId}.m3u8`;

let player, video, controls, playerShell, centerPlay, hideTimer;
const playIcon = document.getElementById("playIcon");

function updatePlayButton() {
if (video.paused) {
playIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
} else {
playIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
}
}

// কন্ট্রোলস শো করার ফাংশন
function showControls(){
controls.classList.remove("hide");
clearTimeout(hideTimer);
if(video.paused) return; 
hideTimer = setTimeout(()=>{
controls.classList.add("hide");
},3500);
}

// টাচ করার সাথে সাথে কোনোরকম ডিলে ছাড়া ইনস্ট্যান্ট টগল করার লজিক
function toggleControls(e) {
e.preventDefault(); // ব্রাউজারের ডিলে করা ইভেন্ট ব্লক করবে
e.stopPropagation();
if(controls.classList.contains("hide")) {
showControls();
} else {
controls.classList.add("hide");
clearTimeout(hideTimer);
}
}

function toggleCenterPlay(){
if(video.paused || video.readyState < 3){
centerPlay.classList.remove("hide");
}else{
centerPlay.classList.add("hide");
}
updatePlayButton();
}

async function init(){
video = document.getElementById("video");
controls = document.getElementById("controls");
playerShell = document.getElementById("playerShell");
centerPlay = document.getElementById("centerPlay");

player = new shaka.Player(video);

// ০% বাফার এবং চরম লেভেলের নেটওয়ার্ক অপ্টিমাইজেশন (Ultra-Low Latency Mode)
player.configure({
streaming: {
bufferingGoal: 3, 
rebufferingGoal: 1, 
bufferBehind: 10, 
liveSyncDuration: 2, 
lowLatencyMode: true,
ignoreTextStreamFailures: true,
stallEnabled: true,
stallThreshold: 1, 
stallSkip: 0.2, 
forceTranscode: false,
fastSwitch: true, 

retryParameters: {
maxAttempts: 15, 
baseDelay: 500,
backoffFactor: 1.2,
timeout: 10000
}
},
abr: {
enabled: true, 
defaultBandwidthEstimate: 500000, 
restrictions: {
minBandwidth: 100000 
}
}
});

// ক্র্যাশ প্রোটেকশন এবং অটো-হিলিং
player.addEventListener('error', async (event) => {
if (event.detail.severity === shaka.util.Error.Severity.CRITICAL) {
console.warn('Network Jammed! Recovering stream...');
try {
await player.unload();
await player.load(STREAM_URL);
video.play().catch(()=>{});
} catch (e) {
setTimeout(init, 2000); 
}
}
});

try{
await player.load(STREAM_URL);
player.setLiveSeekableRange = true;
document.getElementById("loader").style.opacity="0";
setTimeout(()=>{ document.getElementById("loader").style.display="none"; }, 300);
}catch(e){
console.error(e);
}

// ডেস্কটপের জন্য মাউস ইভেন্ট
playerShell.addEventListener("mousemove", showControls);

// মোবাইলের জন্য সুপার-ফাস্ট ইনস্ট্যান্ট রেসপন্স ইভেন্ট (touchend)
playerShell.addEventListener("touchend", toggleControls, { passive: false });

// ডেস্কটপ ব্রাউজারের ব্যাকআপ ক্লিক ইভেন্ট
playerShell.addEventListener("click", (e) => {
    if (e.pointerType !== "touch") { // মোবাইল টাচ হলে এই ক্লিক ইভেন্ট স্কিপ করবে
        toggleControls(e);
    }
});

video.addEventListener("play",()=>{ showControls(); toggleCenterPlay(); });
video.addEventListener("pause",toggleCenterPlay);
video.addEventListener("waiting",toggleCenterPlay);
video.addEventListener("playing",toggleCenterPlay);
video.addEventListener("ratechange", updatePlayButton);

// মাঝখানের প্লে বাটনে টাচ রেসপন্স ফিক্স
centerPlay.addEventListener("touchend", (e) => {
    e.preventDefault();
    e.stopPropagation();
    video.play().catch(()=>{});
});
centerPlay.onclick = (e)=>{
    e.stopPropagation();
    video.play().catch(()=>{});
};

controls.addEventListener("touchend", (e) => e.stopPropagation());
controls.onclick = (e) => e.stopPropagation();
}

/* CONTROLS INTERACTION (মোবাইল ফ্রেন্ডলি টাচ ও ক্লিকের সমন্বয়) */
const handleBtnClick = (id, callback) => {
    const btn = document.getElementById(id);
    btn.addEventListener("touchend", (e) => {
        e.preventDefault();
        e.stopPropagation();
        callback();
    });
    btn.onclick = (e) => {
        e.stopPropagation();
        callback();
    };
};

handleBtnClick("playBtn", () => {
    if(video.paused){
        video.play().catch(()=>{});
    }else{
        video.pause();
        showControls();
    }
});

handleBtnClick("fwdBtn", () => {
    video.currentTime += 10;
    showControls();
});

handleBtnClick("goLive", () => {
    if(!player || !player.isLive()) return;
    const range = player.seekRange();
    video.currentTime = range.end - 0.5; 
    showControls();
});

handleBtnClick("fullscreenBtn", () => {
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen().catch(()=>{});
        if(screen.orientation && screen.orientation.lock) {
            screen.orientation.lock("landscape").catch(()=>{});
        }
    }else{
        document.exitFullscreen().catch(()=>{});
    }
    showControls();
});

// প্রোগ্রেস ট্র্যাক টাচ/ক্লিক লজিক ফিক্স
const handleTrackSeek = (e) => {
    e.preventDefault();
    e.stopPropagation();
    if(!player || !player.isLive()) return;
    const range = player.seekRange();
    const rect = document.getElementById("track").getBoundingClientRect();
    
    // টাচ বা মাউস উভয়ের পজিশন নেওয়া
    const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const offset = (clientX - rect.left) / rect.width;
    
    video.currentTime = range.start + (offset * (range.end - range.start));
    showControls();
};

document.getElementById("track").addEventListener("touchend", handleTrackSeek);
document.getElementById("track").onclick = handleTrackSeek;


// হাই-স্পিড সিঙ্ক ইন্টারভাল
setInterval(()=>{
if(!player || !player.isLive() || video.readyState < 2) return;

const range = player.seekRange();
const delay = Math.max(0, Math.floor(range.end - video.currentTime));

document.getElementById("delay").innerText =
"-"+String(Math.floor(delay/60)).padStart(2,"0")+":"+String(delay%60).padStart(2,"0");

const percent = ((video.currentTime - range.start) / (range.end - range.start)) * 100;
document.getElementById("progress").style.width = Math.min(100, Math.max(0, percent)) + "%";

if (delay > 10) {
video.currentTime = range.end - 1;
}

if (video.currentTime - range.start > 40) {
player.clearBuffer();
}
}, 1000);

shaka.polyfill.installAll();

const ALLOWED_REFERRERS = [
"https://talhas.stream.site.je/",
"https://www.talhas.stream.site.je/",
window.location.origin
];

const referrer = document.referrer;
if (referrer && !ALLOWED_REFERRERS.some(url => referrer.startsWith(url))){
document.body.innerHTML = `
<div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#000;color:#fff;font-size:20px;font-family:Arial,sans-serif;">
Access Denied
</div>`;
throw new Error("Unauthorized");
}

if(shaka.Player.isBrowserSupported()){
init();
}

video.addEventListener("canplay", () => {
video.play().catch(() => {});
});
</script>
</body>
</html>
