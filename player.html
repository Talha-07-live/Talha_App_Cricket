<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talha,s Player</title>
    <!-- Hls.js Core Engine CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
    <!-- FontAwesome Icon Font cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-user-select: none;
        }
        body, html {
            width: 100%; height: 100%; background: #000;
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* মূল প্লেয়ার কন্টেইনার */
        .player-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        video {
            width: 100%; height: 100%; object-fit: contain;
            background: #020206;
        }

        /* থিম লেয়ার এবং শ্যাডো এফেক্ট */
        .player-controls {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(2,2,6,0.5) 0%, transparent 20%, transparent 80%, rgba(2,2,6,0.85) 100%);
            display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5; padding: 15px;
        }
        .player-wrapper:hover .player-controls, 
        .player-controls.show-forced {
            opacity: 1; pointer-events: auto;
        }

        /* টপ বার (লাইভ লোগো ও বাফার ডেটা) */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center; width: 100%;
        }
        .live-tag {
            background: #ff0055; color: #fff; font-size: 10px; font-weight: 800;
            padding: 4px 10px; border-radius: 6px; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255,0,85,0.6); display: flex; align-items: center; gap: 5px;
        }
        .live-tag::before {
            content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%;
            display: inline-block; animation: blink 1s infinite alternate;
        }
        .buffer-status-badge {
            background: rgba(122, 60, 255, 0.2); border: 1px solid rgba(122, 60, 255, 0.4);
            color: #00f2fe; font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 8px;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.5); backdrop-filter: blur(10px);
        }

        /* সেন্টার প্লে/পজ বাটন (অ্যাপ স্টাইল) */
        .center-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: rgba(122, 60, 255, 0.25);
            border: 2px solid #7a3cff; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; color: #fff; font-size: 22px;
            cursor: pointer; backdrop-filter: blur(5px); opacity: 0; pointer-events: none;
            transition: all 0.2s ease; z-index: 6; box-shadow: 0 0 25px rgba(122,60,255,0.5);
        }
        .player-wrapper:hover .center-btn, .center-btn.show-forced {
            opacity: 1; pointer-events: auto;
        }
        .center-btn:hover {
            transform: translate(-50%, -50%) scale(1.1); background: #7a3cff; box-shadow: 0 0 35px #7a3cff;
        }

        /* বটম বার কন্ট্রোলস */
        .bottom-bar {
            width: 100%; display: flex; flex-direction: column; gap: 10px;
        }

        /* 📱 অ্যাডভান্সড প্রোগ্রেস এবং বাফার বার */
        .progress-container {
            width: 100%; height: 5px; background: rgba(255,255,255,0.1);
            border-radius: 10px; position: relative; cursor: pointer; transition: height 0.1s;
        }
        .progress-container:hover { height: 8px; }
        
        /* মেইন প্লেড প্রোগ্রেস বার */
        .progress-bar {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: linear-gradient(90deg, #7a3cff, #00f2fe); border-radius: 10px; z-index: 3;
        }
        /* 💡 ব্যাকগ্রাউন্ড বাফার বার */
        .buffer-bar {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: rgba(255, 255, 255, 0.25); border-radius: 10px; z-index: 2;
        }

        .control-row {
            display: flex; justify-content: space-between; align-items: center; color: #fff;
        }
        .left-controls, .right-controls {
            display: flex; align-items: center; gap: 20px;
        }
        .control-btn {
            background: none; border: none; color: #fff; font-size: 16px; cursor: pointer;
            transition: color 0.2s;
        }
        .control-btn:hover { color: #00f2fe; filter: drop-shadow(0 0 8px #00f2fe); }
        .time-display { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); }

        /* বাফারিং স্পিনার */
        .spinner {
            position: absolute; width: 50px; height: 50px;
            border: 4px solid rgba(0, 242, 254, 0.1); border-top-color: #00f2fe;
            border-radius: 50%; animation: spin 0.8s linear infinite; display: none; z-index: 10;
            filter: drop-shadow(0 0 10px #00f2fe);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="player-wrapper" id="playerContainer">
    
    <!-- বাফারিং স্পিনার লুপ -->
    <div class="spinner" id="loadingSpinner"></div>
    
    <!-- সেন্ট্রাল প্লে বাটন -->
    <div class="center-btn" id="midPlayBtn" onclick="togglePlay()">
        <i class="fas fa-play"></i>
    </div>

    <video id="videoEngine" playsinline></video>

    <!-- কন্ট্রোল ইন্টারফেস ওভারলে -->
    <div class="player-controls" id="controlOverlay">
        
        <!-- টপ ইনফো -->
        <div class="top-bar">
            <div class="live-tag">LIVE</div>
            <div class="buffer-status-badge" id="bufferStats">Engine: Syncing...</div>
        </div>

        <!-- বটম অ্যাপ বার -->
        <div class="bottom-bar">
            
            <!-- স্মার্ট প্রোগ্রেস ও ক্যাশ বার সিস্টেম -->
            <div class="progress-container" id="timeline" onclick="seekVideo(event)">
                <div class="buffer-bar" id="bufferedTimeline"></div>
                <div class="progress-bar" id="currentTimeline"></div>
            </div>

            <div class="control-row">
                <div class="left-controls">
                    <button class="control-btn" id="playNavBtn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                    <button class="control-btn" id="muteBtn" onclick="toggleMute()"><i class="fas fa-volume-up"></i></button>
                    <div class="time-display" id="timeShow">00:00 / Live</div>
                </div>
                <div class="right-controls">
                    <button class="control-btn" onclick="goLive()"><i class="fas fa-satellite-dish"></i> Go Live</button>
                    <button class="control-btn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
                </div>
            </div>

        </div>

    </div>
</div>

<script>
    // URL প্যারামিটার থেকে চ্যানেল আইডি ডিটেক্ট করা
    const urlParams = new URLSearchParams(window.location.search);
    const channelId = urlParams.get('Talha') || "androstreamlivetrt1";
    
    // 🔗 আপনার ক্লাউডফ্লেয়ার ওয়ার্কার্স ভিত্তিক নতুন ডাইনামিক সোর্স ইউআরএল রুলস
    const videoSrc = `https://sndb.rajtammi111212.workers.dev/checklist/${channelId}.m3u8`; 

    const video = document.getElementById('videoEngine');
    const spinner = document.getElementById('loadingSpinner');
    const midPlayBtn = document.getElementById('midPlayBtn');
    const playNavBtn = document.getElementById('playNavBtn');
    const muteBtn = document.getElementById('muteBtn');
    const bufferStats = document.getElementById('bufferStats');
    const currentTimeline = document.getElementById('currentTimeline');
    const bufferedTimeline = document.getElementById('bufferedTimeline');
    const timeShow = document.getElementById('timeShow');
    const controlOverlay = document.getElementById('controlOverlay');
    const playerContainer = document.getElementById('playerContainer');

    let controlsTimeout;

    if (Hls.isSupported()) {
        // 🚀 আল্ট্রা বাফার অপ্টিমাইজেশন ক্যাশিং ইঞ্জিন কনফিগারেশন
        const hlsConfig = {
            maxBufferLength: 180,       // ৩ মিনিট সামনে অ্যাডভান্সড বাফার করবে
            maxMaxBufferLength: 240,    // সর্বোচ্চ ৪ মিনিট মেমরিতে ব্যাকগ্রাউন্ড ব্যাকআপ রাখবে
            liveBackBufferLength: 7200, // পেছনের ২ ঘণ্টার স্ট্রিম মেমরিতে ক্যাশ রাখবে (DVR Catchup)
            enableWorker: true,         // পারফরম্যান্স বুস্ট করার জন্য ওয়েব ওয়ার্কার সচল
            lowLatencyMode: false,      // স্ট্যাবিলিটি বাড়ানোর জন্য ল্যাটেন্সি অপ্টিমাইজ করা হয়েছে
            liveSyncDurationCount: 6,   // বাফার তৈরি হতে সিকিউরিটি গ্যাপ জেনারেট করবে
            appendErrorMaxRetry: 10     // নেটওয়ার্ক ড্রপ করলে সর্বোচ্চ ১০ বার অটো ট্রাই করবে
        };

        const hls = new Hls(hlsConfig);
        hls.loadSource(videoSrc);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => showControlsForced());
        });

        // লোডিং বাফারিং স্পিনার ডিটেকশন লুপ
        video.addEventListener('waiting', () => spinner.style.display = 'block');
        video.addEventListener('playing', () => spinner.style.display = 'none');

        // 📊 রিয়েল-টাইম প্রোগ্রেস ও বাফার বার ভিজ্যুয়ালাইজেশন
        setInterval(() => {
            if (video.buffered.length > 0) {
                const duration = video.duration || 1;
                const currentTime = video.currentTime;
                
                // কারেন্ট টাইম প্রোগ্রেস বার
                const currentPercent = (currentTime / duration) * 100;
                currentTimeline.style.width = currentPercent + "%";

                // বাফার ক্যাশ ডাটা জেনারেশন বার
                let activeBufferEnd = 0;
                for (let i = 0; i < video.buffered.length; i++) {
                    if (video.buffered.start(i) <= currentTime && video.buffered.end(i) >= currentTime) {
                        activeBufferEnd = video.buffered.end(i);
                    }
                }
                
                const bufferPercent = (activeBufferEnd / duration) * 100;
                bufferedTimeline.style.width = bufferPercent + "%";

                // স্ট্যাটাস টেক্সট শো
                const aheadAmount = activeBufferEnd - currentTime;
                bufferStats.innerText = `Buffered: ${Math.round(aheadAmount)}s / 180s`;
                
                // টাইম ডিসপ্লে
                timeShow.innerText = `${formatTime(currentTime)} / Live DVR`;
            }
        }, 500);

        // অটো ফল্ট-টলারেন্স ও রিকভারি লুপ
        hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
                if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                    console.log("Network drop detected, recovering...");
                    hls.startLoad();
                } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                    console.log("Media stall detected, recovering handles...");
                    hls.recoverMediaError();
                }
            }
        });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // iOS এবং Safari নেটিভ প্লেব্যাক ইমপ্লিমেন্টেশন
        video.src = videoSrc;
    }

    // 🕹️ প্লেয়ার ফাংশনাল কন্ট্রোল স্ক্রিপ্ট
    function togglePlay() {
        if (video.paused) {
            video.play();
            midPlayBtn.innerHTML = '<i class="fas fa-pause"></i>';
            playNavBtn.innerHTML = '<i class="fas fa-pause"></i>';
            hideControlsWithDelay();
        } else {
            video.pause();
            midPlayBtn.innerHTML = '<i class="fas fa-play"></i>';
            playNavBtn.innerHTML = '<i class="fas fa-play"></i>';
            showControlsForced();
        }
    }

    function toggleMute() {
        if (video.muted) {
            video.muted = false;
            muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
        } else {
            video.muted = true;
            muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
        }
    }

    // প্রোগ্রেস বার টেনে ক্যাশ ব্যাকলগ ভিডিও দেখা (DVR Mode)
    function seekVideo(e) {
        const rect = document.getElementById('timeline').getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        if(video.duration) {
            video.currentTime = pos * video.duration;
        }
    }

    // পুনরায় সরাসরি রিয়েল-টাইম লাইভ পয়েন্টে ফিরে আসার মেকানিজম
    function goLive() {
        if(video.duration) {
            video.currentTime = video.duration - 1;
        }
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            playerContainer.requestFullscreen().catch(err => alert(err.message));
        } else {
            document.exitFullscreen();
        }
    }

    function formatTime(seconds) {
        let min = Math.floor(seconds / 60);
        let sec = Math.floor(seconds % 60);
        return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    // স্মার্ট কন্ট্রোল বার অটো-হাইড মেকানিজম
    function showControlsForced() {
        clearTimeout(controlsTimeout);
        controlOverlay.classList.add('show-forced');
        midPlayBtn.classList.add('show-forced');
        controlOverlay.style.opacity = '1';
    }

    function hideControlsWithDelay() {
        clearTimeout(controlsTimeout);
        controlOverlay.classList.remove('show-forced');
        midPlayBtn.classList.remove('show-forced');
        controlsTimeout = setTimeout(() => {
            if(!video.paused) {
                controlOverlay.style.opacity = '0';
            }
        }, 3000);
    }

    playerContainer.addEventListener('mousemove', () => {
        controlOverlay.style.opacity = '1';
        hideControlsWithDelay();
    });

    playerContainer.addEventListener('touchstart', () => {
        controlOverlay.style.opacity = '1';
        hideControlsWithDelay();
    });

    video.addEventListener('play', () => hideControlsWithDelay());
</script>
</body>
</html>
