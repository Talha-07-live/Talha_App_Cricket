<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talha's Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
        }
        body, html {
            width: 100%; height: 100%; background: #000;
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .player-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; background: #020206;
        }

        video {
            width: 100%; height: 100%; object-fit: contain; z-index: 1;
            outline: none !important;
        }

        .player-controls {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(2,2,6,0.6) 0%, transparent 25%, transparent 75%, rgba(2,2,6,0.9) 100%);
            display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5; padding: 20px;
        }
        
        .player-controls.show-controls {
            opacity: 1 !important; pointer-events: auto !important;
        }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center; width: 100%;
        }
        
        .live-tag {
            background: #ff0055; color: #fff; font-size: 11px; font-weight: 800;
            padding: 5px 12px; border-radius: 6px; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255,0,85,0.5); display: flex; align-items: center; gap: 6px;
        }
        
        .live-tag::before {
            content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%;
            animation: blink 1s infinite alternate;
        }
        
        .buffer-status-badge {
            background: rgba(122, 60, 255, 0.15); border: 1px solid rgba(122, 60, 255, 0.35);
            color: #00f2fe; font-size: 11px; font-weight: 700; padding: 6px 14px; border-radius: 8px;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.4); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .center-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 65px; height: 65px; background: rgba(122, 60, 255, 0.2);
            border: 2px solid #7a3cff; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; color: #fff; font-size: 24px;
            cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); 
            opacity: 0; pointer-events: none;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 6; 
            box-shadow: 0 0 30px rgba(122,60,255,0.4);
        }
        
        .center-btn.show-controls {
            opacity: 1 !important; pointer-events: auto !important;
        }

        .bottom-bar {
            width: 100%; display: flex; flex-direction: column; gap: 12px;
        }

        .progress-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.08);
            border-radius: 10px; position: relative; cursor: pointer; transition: height 0.1s;
        }
        .progress-container:hover { height: 9px; }
        
        .progress-bar {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: linear-gradient(90deg, #7a3cff, #00f2fe); border-radius: 10px; z-index: 3;
        }
        
        .buffer-bar {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: rgba(255, 255, 255, 0.22); border-radius: 10px; z-index: 2;
            transition: width 0.3s ease;
        }

        .control-row {
            display: flex; justify-content: space-between; align-items: center; color: #fff;
        }
        
        .left-controls, .right-controls {
            display: flex; align-items: center; gap: 22px;
        }
        
        .control-btn {
            background: none; border: none; color: #fff; font-size: 17px; cursor: pointer;
            transition: all 0.2s;
            box-shadow: none !important;
        }
        
        .control-btn:hover { color: #00f2fe; filter: drop-shadow(0 0 8px #00f2fe); }
        .control-btn:active, .control-btn:focus { background: none !important; }
        
        .time-display { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.65); letter-spacing: 0.5px; }

        .spinner {
            position: absolute; width: 55px; height: 55px;
            border: 4px solid rgba(0, 242, 254, 0.08); border-top-color: #00f2fe;
            border-radius: 50%; animation: spin 0.7s linear infinite; display: none; z-index: 10;
            filter: drop-shadow(0 0 15px #00f2fe);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="player-wrapper" id="playerContainer">
    
    <div class="spinner" id="loadingSpinner"></div>
    
    <div class="center-btn" id="midPlayBtn">
        <i class="fas fa-play"></i>
    </div>

    <video id="videoEngine" playsinline></video>

    <div class="player-controls" id="controlOverlay">
        
        <div class="top-bar">
            <div class="live-tag">LIVE</div>
            <div class="buffer-status-badge" id="bufferStats">Engine: Syncing...</div>
        </div>

        <div class="bottom-bar">
            
            <div class="progress-container" id="timeline">
                <div class="buffer-bar" id="bufferedTimeline"></div>
                <div class="progress-bar" id="currentTimeline"></div>
            </div>

            <div class="control-row">
                <div class="left-controls">
                    <button class="control-btn" id="playNavBtn"><i class="fas fa-play"></i></button>
                    <button class="control-btn" id="muteBtn"><i class="fas fa-volume-up"></i></button>
                    <div class="time-display" id="timeShow">00:00 / Live</div>
                </div>
                <div class="right-controls">
                    <button class="control-btn" style="font-size:12px; font-weight:700;" id="goLiveBtn"><i class="fas fa-satellite-dish" style="color:#ff0055;"></i> GO LIVE</button>
                    <button class="control-btn" id="fullScreenBtn"><i class="fas fa-expand"></i></button>
                </div>
            </div>

        </div>

    </div>
</div>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const channelId = urlParams.get('Talha') || "androstreamlivetrt1";
        const videoSrc = `https://m3u8-proxy-r8j3.vercel.app/checklist/${channelId}.m3u8`; 

        const video = document.getElementById('videoEngine');
        const spinner = document.getElementById('loadingSpinner');
        const midPlayBtn = document.getElementById('midPlayBtn');
        const playNavBtn = document.getElementById('playNavBtn');
        const muteBtn = document.getElementById('muteBtn');
        const bufferStats = document.getElementById('bufferStats');
        const currentTimeline = document.getElementById('currentTimeline');
        const bufferedTimeline = document.getElementById('bufferedTimeline');
        const timeShow = document.getElementById('timeShow');
        const controlOverlay = document.getElementById('controlOverlay');
        const playerContainer = document.getElementById('playerContainer');
        const timeline = document.getElementById('timeline');
        const goLiveBtn = document.getElementById('goLiveBtn');
        const fullScreenBtn = document.getElementById('fullScreenBtn');

        let controlsTimeout;
        let isSeeking = false;

        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
            
            const hlsConfig = {
                maxBufferLength: 30,             
                maxMaxBufferLength: 60,          
                liveBackBufferLength: 0,         
                enableWorker: true,              
                lowLatencyMode: true,            
                
                manifestLoadingTimeOut: 20000,
                manifestLoadingMaxRetry: 10,
                fragLoadingTimeOut: 30000,
                fragLoadingMaxRetry: 10,
                levelLoadingTimeOut: 20000,
                levelLoadingMaxRetry: 10,
                
                
                abrEwmaFastLive: 2.0,            
                abrEwmaSlowLive: 9.0,            
                testBandwidth: true              
            };

            const hls = new Hls(hlsConfig);
            hls.loadSource(videoSrc);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                hls.currentLevel = -1; 
                video.play().catch(() => showControls());
            });

            video.addEventListener('waiting', () => spinner.style.display = 'block');
            video.addEventListener('playing', () => spinner.style.display = 'none');
            video.addEventListener('stalled', () => {
                spinner.style.display = 'block';
                hls.startLoad(); 
            });

            setInterval(() => {
                if (video.buffered.length > 0 && !isSeeking) {
                    const duration = (video.duration && isFinite(video.duration) && video.duration > 0) ? video.duration : (video.currentTime + 300);
                    const currentTime = video.currentTime;
                    
                    const currentPercent = (currentTime / duration) * 100;
                    currentTimeline.style.width = Math.min(currentPercent, 100) + "%";

                    let activeBufferEnd = currentTime;
                    for (let i = 0; i < video.buffered.length; i++) {
                        if (video.buffered.start(i) <= currentTime && video.buffered.end(i) >= currentTime) {
                            activeBufferEnd = video.buffered.end(i);
                        }
                    }
                    
                    const bufferPercent = (activeBufferEnd / duration) * 100;
                    bufferedTimeline.style.width = Math.min(bufferPercent, 100) + "%";

                    const aheadAmount = activeBufferEnd - currentTime;
                    
                    bufferStats.innerText = `Buffer Guard: ${Math.round(Math.max(0, aheadAmount))}s / 60s`;
                    timeShow.innerText = `${formatTime(currentTime)} / Talha's Player`;
                }
            }, 400);

            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            hls.recoverMediaError();
                            break;
                        default:
                            hls.recoverMediaError();
                            break;
                    }
                }
            });

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', () => {
                video.play().catch(() => showControls());
            });
        }

       
        function togglePlay() {
            if (video.paused) {
                video.play().catch(() => {});
            } else {
                video.pause();
            }
        }

        video.addEventListener('play', () => {
            midPlayBtn.innerHTML = '<i class="fas fa-pause"></i>';
            playNavBtn.innerHTML = '<i class="fas fa-pause"></i>';
            resetControlsTimeout();
        });

        video.addEventListener('pause', () => {
            midPlayBtn.innerHTML = '<i class="fas fa-play"></i>';
            playNavBtn.innerHTML = '<i class="fas fa-play"></i>';
            showControls();
        });

        function toggleMute() {
            if (video.muted) {
                video.muted = false;
                muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
            } else {
                video.muted = true;
                muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
            }
        }

        function seekVideo(e) {
            const rect = timeline.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            if (!clientX) return;
            
            const pos = (clientX - rect.left) / rect.width;
            const targetDuration = (video.duration && isFinite(video.duration) && video.duration > 0) ? video.duration : (video.currentTime + 300);
            
            isSeeking = true;
            video.currentTime = pos * targetDuration;
            setTimeout(() => { isSeeking = false; }, 300);
        }

        function goLive() {
            if (video.duration && isFinite(video.duration)) {
                video.currentTime = video.duration - 10;
            } else {
                video.currentTime = video.currentTime + 200;
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                playerContainer.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function showControls() {
            clearTimeout(controlsTimeout);
            controlOverlay.classList.add('show-controls');
            midPlayBtn.classList.add('show-controls');
        }

        function hideControls() {
            if (!video.paused) {
                controlOverlay.classList.remove('show-controls');
                midPlayBtn.classList.remove('show-controls');
            }
        }

        function resetControlsTimeout() {
            showControls();
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(hideControls, 3000);
        }

        midPlayBtn.onclick = togglePlay;
        playNavBtn.onclick = togglePlay;
        video.onclick = togglePlay; 
        
        muteBtn.onclick = toggleMute;
        timeline.onclick = seekVideo;
        goLiveBtn.onclick = goLive;
        fullScreenBtn.onclick = toggleFullscreen;

        playerContainer.addEventListener('mousemove', resetControlsTimeout);
        playerContainer.addEventListener('touchstart', (e) => {
            if (e.target.closest('.control-btn') || e.target.closest('.progress-container')) {
                resetControlsTimeout();
                return;
            }
            if (controlOverlay.classList.contains('show-controls')) {
                hideControls();
            } else {
                resetControlsTimeout();
            }
        }, { passive: true });
    };
</script>
</body>
</html>
